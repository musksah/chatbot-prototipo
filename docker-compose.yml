version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "8000:8080"
    volumes:
      # Mount source code for hot-reload during development
      - ./backend/app:/app/app:ro
      - ./backend/docs:/app/docs:ro
      # Persist generated PDFs
      - ./backend/generated_pdfs:/app/generated_pdfs
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chatbot-network

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: chatbot-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge
